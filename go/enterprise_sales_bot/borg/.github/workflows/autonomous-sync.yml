name: Autonomous Sync & Health

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  autonomous-sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.x'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Upstream Sync & Sanitization
      run: |
        git fetch --all --tags
        git submodule update --init --recursive --remote

    - name: Repository Synchronization & Self-Healing
      run: |
        cd go
        go run cmd/repo_sync/main.go
        go run cmd/health_monitor/main.go

    - name: Commit & Push Changes
      run: |
        git config --global user.name "TormentNexus Bot"
        git config --global user.email "bot@tormentnexus.ai"
        git add .
        if ! git diff --cached --quiet; then
          git commit -m "chore: autonomous repository sync and health update [skip ci]"
          git push
        fi
