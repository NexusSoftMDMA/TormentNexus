id: 04-language-localization-audit
name: Multi-Language Localization Spot Audit
priority: P0
goal: |
  Walk through 6 high-traffic real pages in the persona's language and detect
  any English (or wrong-language) text mixed in. This is the enforcement
  loop for the "no language mixing" product quality rule.

applies_to:
  personas:
    - jp-japanese-pro-desktop
    - de-german-power-tablet
    - cn-chinese-free-mobile
    - br-portuguese-free-desktop
    - sa-arabic-pro-mobile

scoring_dimensions:
  - localization

steps:
  - id: home
    type: visit
    url: https://your-app.example.com/${persona.url_locale}
    wait_until: domcontentloaded

  - id: home-i18n-check
    type: assert_visual
    critical: false
    instruction: |
      Scan the entire visible viewport for any text that is NOT in
      ${persona.language}. The audited site's own brand and trademarks,
      well-known third-party brand names that may appear (e.g. payment
      providers, social platforms), and well-known acronyms (URL, AI, API,
      GDPR, OFAC, USDT, KYC, DeFi, SDK, SaaS, B2B, B2C, NFT) are exempt.
      Currency codes (USD, EUR, JPY) are exempt.
      Return JSON with a "violations" array of {text, location} objects.

  - id: pricing
    type: visit
    url: https://your-app.example.com/${persona.url_locale}/pricing
    wait_until: domcontentloaded

  - id: pricing-i18n-check
    type: assert_visual
    critical: false
    instruction: |
      Same i18n check on the pricing page. Pay special attention to plan
      tier names, feature lists, billing cycle labels, FAQ accordion items,
      and CTA buttons. Currency display (USD vs local) is also a localization
      issue worth flagging at HIGH severity.

  - id: features
    type: visit
    url: https://your-app.example.com/${persona.url_locale}/features
    wait_until: domcontentloaded

  - id: features-i18n-check
    type: assert_visual
    instruction: |
      Same i18n check on the features landing page. Watch for domain
      jargon untranslated and feature card titles in English.

  - id: docs
    type: visit
    url: https://your-app.example.com/${persona.url_locale}/docs
    wait_until: domcontentloaded

  - id: docs-i18n-check
    type: assert_visual
    instruction: |
      Same check on the documentation index. Flag any section titles or
      navigation labels that remain in English.

  - id: about
    type: visit
    url: https://your-app.example.com/${persona.url_locale}/about
    wait_until: domcontentloaded

  - id: about-i18n-check
    type: assert_visual
    instruction: |
      Same check on the about page. Watch for company description,
      mission statement, or team-section copy left in English.

  - id: blog
    type: visit
    url: https://your-app.example.com/${persona.url_locale}/blog
    wait_until: domcontentloaded

  - id: blog-i18n-check
    type: assert_visual
    instruction: |
      Same check on the blog index. If individual post titles are still
      in English while the rest of the page is translated, that is a
      localization gap worth flagging.
