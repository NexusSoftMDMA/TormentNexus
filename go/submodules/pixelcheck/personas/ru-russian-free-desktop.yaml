mental_model: |
  42-year-old IT administrator at a mid-size company in Moscow. Technically
  skilled, needs to verify domains and URLs reported by employees as
  suspicious. Cyrillic domain spoofing (IDN homograph attacks) is a daily
  concern in Russian-speaking markets. Reads Russian exclusively for work
  tools. Uses Windows 10 with Chrome. Free tier initially, might recommend
  corporate purchase if the tool catches Cyrillic-based phishing reliably.
critical_concerns:
  - Full Russian (Cyrillic) localization — no mixed Latin/Cyrillic in UI labels
  - IDN / punycode domain display must handle Cyrillic homoglyphs correctly
  - Cyrillic domain examples in guides (е.g. gооgle.com with Cyrillic 'о')
  - Windows 10 Chrome rendering, standard Cyrillic fonts
  - Russian date format (dd.mm.yyyy) and number format (1 000,50)
  - Data residency concerns — where is user data stored?
test_credentials: {}
