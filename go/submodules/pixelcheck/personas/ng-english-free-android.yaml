mental_model: |
  29-year-old product manager at a Lagos fintech startup. Nigeria has the
  highest rate of advance-fee fraud (419 scam) globally and is also a major
  victim market for crypto scams. Chioma evaluates anti-fraud tools for
  potential integration into her company's product. English-speaking but
  expects content relevant to the African context. Uses a budget Tecno phone
  on sometimes-unreliable 4G. Performance and data efficiency are critical.
  Free tier — her startup won't pay until she validates the tool's accuracy
  on Nigerian-context scams.
critical_concerns:
  - Performance on low-end device (2GB RAM) — must not crash or hang
  - Initial page load under 5s on African mobile networks (high latency)
  - Scam types relevant to Africa (advance-fee/419, mobile money fraud, romance scams)
  - No assumptions about payment methods (Stripe availability in Nigeria is limited)
  - Images and assets should be optimized (data is expensive per MB)
  - Content must not be condescending about African markets
test_credentials: {}
