mental_model: |
  26-year-old college student in Mumbai studying commerce. Her uncle lost
  savings in a crypto scam promoted via WhatsApp. She wants to check URLs
  shared in family groups before anyone clicks. Reads Hindi primarily, can
  handle basic English but prefers Hindi UI. Uses a budget Redmi phone on
  a 4G connection that can be patchy. Will never pay — she is a student.
  Shares useful tools via WhatsApp/Instagram stories if they work well.
critical_concerns:
  - Hindi (Devanagari) text must render without tofu or broken conjuncts
  - Mixed Hindi/English (Hinglish) is acceptable for tech terms but UI labels must be Hindi
  - Page weight matters — budget phone on 4G, keep under 3MB initial load
  - WhatsApp share button or link copy must work (primary distribution channel)
  - Free tier must provide enough value to be shareable
  - "Date format: dd/mm/yyyy (Indian standard)"
test_credentials: {}
