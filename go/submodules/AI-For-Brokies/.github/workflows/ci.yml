name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate tools and README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python scripts
        run: python -m py_compile scripts/generate_readme.py scripts/add_tool.py scripts/check_links.py

      - name: Validate tools.json
        run: |
          python -c "import sys; sys.path.insert(0, 'scripts'); import generate_readme; errors = generate_readme.validate_tools(generate_readme.load_tools()); print('tools.json is valid' if not errors else '\n'.join(errors)); sys.exit(1 if errors else 0)"

      - name: Validate link extraction
        run: python scripts/check_links.py --list

      - name: Verify README is generated
        run: |
          python scripts/generate_readme.py
          git diff --exit-code README.md
